# Route staging.ecommarj.com → staging stack (port 8080)
server {
    listen 80;
    server_name staging.ecommarj.com;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Redirect HTTP to HTTPS (production)
server {
    listen 80;
    server_name ecommarj.com www.ecommarj.com;
    
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ecommarj.com www.ecommarj.com;

    ssl_certificate /etc/letsencrypt/live/ecommarj.com/fullchain1.pem;
    ssl_certificate_key /etc/letsencrypt/live/ecommarj.com/privkey1.pem;

    # Backend API İstekleri
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin Paneli
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Statik Dosyaları
    location /django_static/ {
        alias /app/staticfiles/;
    }

    # SSL ACME Challenge for future renewals via webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Diğer tüm istekler Frontend'e (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Next.js WebSocket desteği için
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
