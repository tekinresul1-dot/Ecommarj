# Production overrides: SSL sertifikası ve HTTPS
# Kullanım: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  backend:
    # Production'da port 8000 dışarıya açılmaz — tüm trafik Nginx üzerinden geçer
    ports: !reset []
    environment:
      - DJANGO_DEBUG=False
      - POSTGRES_HOST=postgres

  postgres:
    # Production'da veritabanı portu dışarıya açılmaz
    ports: !reset []

  redis:
    # Production'da Redis portu dışarıya açılmaz (auth olmadan açık kalır)
    ports: !reset []

  frontend:
    # Production'da frontend portu dışarıya açılmaz — Nginx üzerinden servis edilir
    ports: !reset []

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default_prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/staticfiles:/app/staticfiles:ro
      - /etc/letsencrypt/live/ecommarj.com:/etc/letsencrypt/live/ecommarj.com:ro
      - /etc/letsencrypt/archive/ecommarj.com:/etc/letsencrypt/archive/ecommarj.com:ro
      # Certbot webroot — otomatik yenilemede ACME challenge dosyaları buradan servis edilir
      - /var/www/certbot:/var/www/certbot:ro
